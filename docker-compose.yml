version: '3.8'

services:
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database and enable code sharing if needed
      - ./be:/app
      # Exclude node_modules/venv
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Optional configurations for Next.js in container
      - PORT=3000
